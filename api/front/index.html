<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">
<title>Lista de Compras</title>
</head>
<body>

<h1>Lista de Compras</h1>

<input type="text" id="id" hidden>
<input type="text" id="produto" placeholder="Nome do item">
<input type="text" id="valor" placeholder="Valor do item">
<input type="text" id="quantidade" placeholder="Quantidade de itens">
<button onclick="cadastrar()">Adicionar</button>
<div id="popup" class="popup">
    <div class="popup-content">
        <h2>Alterar Produto</h2>

        <label>ID</label>
        <input type="text" id="id-popup" readonly> 

        <label>Produto</label>
        <input type="text" id="produto-popup">

        <label>Valor</label>
        <input type="number" id="valor-popup">

        <label>Quantidade</label>
        <input type="number" id="quantidade-popup">

        <br><br>

        <button onclick="fecharPopup()">Fechar</button>
        <button onclick="alterar()" class="botaoalterar">Alterar</button>
    </div>
</div>
<script>
function abrirPopup(id, produto, valor, quantidade) {
    const popup = document.getElementById("popup");

    popup.style.display = "flex"; 

    document.getElementById("id-popup").value = id;
    document.getElementById("produto-popup").value = produto;
    document.getElementById("valor-popup").value = valor;
    document.getElementById("quantidade-popup").value = quantidade;
}

function fecharPopup() {
    document.getElementById("popup").style.display = "none";
}
</script>
<button onclick="abrirPopupDeletar()" class="botaodeletar">Deletar</button>
<button onclick="imprimirLista()" class="imprimir">🖨️ Imprimir Lista</button>

<div id="popupDeletar" class="popupdeletar">
    <div class="popup-content">
        <h2>Deletar Carrinho</h2>

        <label>Procurar Carrinho</label>
        <input type="text" id="buscarCarrinho" placeholder="Digite o ID ou nome do carrinho">

        <br><br>

        <button onclick="deletar()" class="botaodeletar">Deletar</button>
        <button onclick="fecharPopupDeletar()">Cancelar</button>
    </div>
</div>

<script>
function abrirPopupDeletar() {
    document.getElementById("popupDeletar").style.display = "flex";
}

function fecharPopupDeletar() {
    document.getElementById("popupDeletar").style.display = "none";
}

function deletar() {
    const carrinho = document.getElementById("buscarCarrinho").value;

    console.log("Carrinho a deletar:", carrinho);

    fecharPopupDeletar();
}
</script>
<hr>

    <table class="tabelaCimaLista">
        <thead>
            <tr>
                <th>ID</th>
                <th>Produto</th>
                <th>Valor</th>
                <th>Quantidade</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="tabelaCarrinho"></tbody>
    </table>
        <script src="./script.js"></script>
</body>
</html>
