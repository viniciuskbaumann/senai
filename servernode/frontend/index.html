    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos</title>
    <link rel="stylesheet" href="./style.css">
    </head>
    <body>

    <h1>Lista de Jogos</h1>

    <div class="buttons">
        <button id="btnTabela">Mostrar em Tabela</button>
        <button id="btnCards">Mostrar em Cards</button>

        <input type="text" id="id" placeholder="Id">
        <input type="text" id="nome" placeholder="Nome do Jogo">
        <input type="text" id="genero" placeholder="Genero">
        <input type="text" id="ano" placeholder="Ano">
        <button id="cadastrar">Cadastrar jogo</button>
    </div>

    <div id="conteudo"></div>

    <script src="./script.js"></script>
    </body>
    </html>
